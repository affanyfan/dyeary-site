<!--
  SOURCE OF assets/og.png (the social share / link-preview card).

  As of 2026-07-22 this asset is NO LONGER generated from this file. It is
  designed and rendered in the Claude Design project:

    Project : "social media assets for dyeary"
    File    : Link Preview.dc.html
    Project id : a324cf7c-621f-4443-a239-8ba22aeb0eba
    URL     : https://claude.ai/design/p/a324cf7c-621f-4443-a239-8ba22aeb0eba?file=Link+Preview.dc.html

  The card = a faded "year-in-feeling" mood grid, the headline
  "A voice-first journal.", the dyeary.ai logo, and a 3-phone product hero
  (recording / home / calendar).

  To regenerate assets/og.png:
    1. Edit the card in the design project above.
    2. Export the 1200x630 PNG (a 2400x1260 @2x export also exists).
    3. Flatten the 14px rounded/transparent corners onto the paper colour so
       social clients don't render them as black/white notches, then save as
       assets/og.png (RGB, no alpha):

         from PIL import Image
         im = Image.open("dyeary-og-1200x630.png").convert("RGBA")
         bg = Image.new("RGB", im.size, (0xF6, 0xF1, 0xE4))   # --paper1
         bg.paste(im, mask=im.split()[3])
         bg.save("assets/og.png", "PNG", optimize=True)

    4. Bump the ?v=N cache-bust on og:image / twitter:image in index.html so
       scrapers refetch instead of serving the cached previous card.

  The previous purely-typographic card was generated from the HTML that used
  to live in this file; see git history if you need it.
-->
