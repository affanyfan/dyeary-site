<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>dyeary · a voice journal that remembers how you felt</title>
<meta name="description" content="Talk for a minute. dyeary writes the entry for you and quietly maps your mood across the whole year." />

<link rel="icon" href="logo.png" />
<link rel="apple-touch-icon" href="logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --paper:   #F1EADC;   /* warm parchment */
    --paper-2: #F7F2E8;   /* raised card */
    --ink:     #2A2520;   /* warm near-black */
    --muted:   #6C6357;
    --faint:   #9A9082;
    --line:    #E0D5C1;

    /* dyeary's eight moods, straight from the app palette */
    --joy:      #D99A2B;
    --calm:     #7E9B79;
    --love:     #C58A86;
    --sad:      #6E8198;
    --anger:    #B5523C;
    --fear:     #8A7BA0;
    --surprise: #E0B255;
    --tired:    #9B948A;

    --accent: var(--love);

    --cell: clamp(9px, 1.45vw, 15px);
    --gap:  clamp(3px, 0.42vw, 5px);

    --maxw: 1080px;
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Hanken Grotesk", ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-size: 17px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  ::selection { background: rgba(197,138,134,0.32); }

  .wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }

  a { color: inherit; }

  /* ---- eyebrow / small-caps utility ---- */
  .eyebrow {
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--faint);
  }

  /* ---- display type ---- */
  h1, h2, h3 { font-family: "Cormorant", Georgia, serif; font-weight: 500; line-height: 1.04; margin: 0; }

  /* ====================== NAV ====================== */
  .nav {
    position: sticky; top: 0; z-index: 40;
    background: color-mix(in srgb, var(--paper) 86%, transparent);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid transparent;
    transition: border-color .3s ease;
  }
  .nav.scrolled { border-bottom-color: var(--line); }
  .nav-in { display: flex; align-items: center; justify-content: space-between; height: 66px; }
  .brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; }
  .brand .logo {
    width: 26px; height: 26px; border-radius: 7px; display: block;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.07);
  }
  .brand b { font-family: "Cormorant", serif; font-weight: 600; font-size: 20px; letter-spacing: 0.01em; }
  .nav-right { display: flex; align-items: center; gap: 22px; }
  .nav-link { text-decoration: none; color: var(--muted); font-size: 15px; font-weight: 500; }
  .nav-link:hover { color: var(--ink); }

  /* ---- buttons ---- */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: inherit; font-size: 15px; font-weight: 600;
    text-decoration: none; cursor: pointer;
    padding: 11px 20px; border-radius: 999px;
    border: 1px solid transparent;
    transition: transform .15s ease, background .2s ease, box-shadow .2s ease;
  }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 22px -12px rgba(42,37,32,0.7); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line); }
  .btn-ghost:hover { background: var(--paper-2); border-color: var(--muted); }
  .btn .arrow { transition: transform .2s ease; }
  .btn:hover .arrow { transform: translateX(3px); }

  /* ====================== HERO ====================== */
  .hero { padding: clamp(48px, 8vw, 96px) 0 0; text-align: center; }
  .hero .eyebrow { display: block; margin-bottom: 22px; }
  .hero h1 {
    font-size: clamp(44px, 8.2vw, 92px);
    letter-spacing: -0.02em;
  }
  .hero h1 em { font-style: italic; font-weight: 400; color: var(--accent); }
  .hero .sub {
    max-width: 540px; margin: 26px auto 0;
    font-size: clamp(17px, 2.2vw, 20px); color: var(--muted);
  }
  .hero-cta { margin-top: 34px; display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

  /* ---- the signature: a year of moods ---- */
  .map-frame {
    margin-top: clamp(48px, 7vw, 86px);
    position: relative;
    overflow: hidden;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);
            mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);
  }
  .moodmap {
    display: grid;
    grid-auto-flow: column;
    grid-template-rows: repeat(7, var(--cell));
    gap: var(--gap);
    width: max-content;
    margin: 0 auto;
    padding: 4px;
  }
  .cell {
    width: var(--cell); height: var(--cell);
    border-radius: 3px;
    background: var(--c, transparent);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.035);
    opacity: 0;
    transform: scale(0.4);
  }
  .cell.empty { background: rgba(122,112,96,0.10); box-shadow: none; }
  .cell.in { animation: pop .5s cubic-bezier(.2,.8,.2,1) forwards; animation-delay: var(--d, 0ms); }
  @keyframes pop { to { opacity: 1; transform: scale(1); } }

  .map-caption {
    margin-top: 20px; text-align: center;
    font-size: 13.5px; color: var(--faint);
    letter-spacing: 0.04em;
  }

  /* legend */
  .legend { margin-top: 16px; display: flex; gap: 16px 22px; justify-content: center; flex-wrap: wrap; }
  .legend span { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--muted); }
  .legend i { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }

  /* tooltip */
  .tip {
    position: fixed; z-index: 60; pointer-events: none;
    background: var(--ink); color: var(--paper);
    font-size: 12.5px; font-weight: 500;
    padding: 5px 9px; border-radius: 7px;
    transform: translate(-50%, -130%);
    opacity: 0; transition: opacity .12s ease;
    white-space: nowrap;
  }
  .tip.show { opacity: 1; }

  /* ====================== SECTIONS ====================== */
  .section { padding: clamp(72px, 11vw, 132px) 0; }
  .section-head { max-width: 620px; }
  .section-head.center { margin: 0 auto; text-align: center; }
  .section-head h2 { font-size: clamp(32px, 4.6vw, 52px); letter-spacing: -0.015em; }
  .section-head .eyebrow { display: block; margin-bottom: 16px; }
  .section-head p { color: var(--muted); font-size: 18px; margin: 18px 0 0; }

  .rule { height: 1px; background: var(--line); border: 0; margin: 0; }

  /* ---- how it works: three movements ---- */
  .steps { margin-top: clamp(44px, 6vw, 72px); display: grid; gap: clamp(40px, 6vw, 64px); }
  .step { display: grid; grid-template-columns: 1fr 300px; gap: clamp(28px, 5vw, 64px); align-items: center; }
  .step:nth-child(even) { grid-template-columns: 300px 1fr; }   /* keep text in the wide column both sides */
  .step:nth-child(even) .step-text { order: 2; }
  .step-text .num {
    font-family: "Cormorant", serif; font-style: italic;
    font-size: 19px; color: var(--accent); font-weight: 500;
  }
  .step-text h3 { font-size: clamp(26px, 3.4vw, 36px); margin-top: 6px; letter-spacing: -0.01em; }
  .step-text h3, .step-text p { max-width: 25rem; }   /* title + paragraph share one measure */
  .step-text p { color: var(--muted); margin: 14px 0 0; }

  /* phone frame (screenshot slot) */
  .phone {
    justify-self: center;
    width: 248px; aspect-ratio: 248 / 510;
    border-radius: 38px;
    background: #15110D;
    padding: 9px;
    box-shadow: 0 30px 60px -28px rgba(42,37,32,0.55), inset 0 0 0 1px rgba(255,255,255,0.06);
    position: relative; z-index: 0;   /* contain inner z-indexes so the nav stays on top */
  }
  .phone .screen {
    width: 100%; height: 100%;
    border-radius: 30px; overflow: hidden;
    background: linear-gradient(170deg, var(--paper-2), #ECE3D2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; position: relative;
  }
  .phone .screen img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .phone .ph-dot { width: 30px; height: 30px; border-radius: 50%; background: radial-gradient(circle at 38% 34%, #DCBD90, #A9783F); }
  .phone .ph-label { font-size: 12px; color: var(--faint); letter-spacing: 0.06em; text-transform: uppercase; }

  /* ---- features triptych ---- */
  .features { margin-top: clamp(44px, 6vw, 72px); display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 18px; overflow: hidden; }
  .feature { background: var(--paper); padding: 34px 30px; }
  .feature .swatch { display: flex; gap: 5px; margin-bottom: 18px; }
  .feature .swatch i { width: 14px; height: 14px; border-radius: 4px; }
  .feature h3 { font-size: 22px; letter-spacing: -0.01em; }
  .feature p { color: var(--muted); font-size: 15.5px; margin: 10px 0 0; }

  /* ---- trust band ---- */
  .trust { background: var(--ink); color: var(--paper); }
  .trust .wrap { padding-top: clamp(64px, 9vw, 104px); padding-bottom: clamp(64px, 9vw, 104px); }
  .trust .eyebrow { color: rgba(241,234,220,0.5); display: block; margin-bottom: 18px; }
  .trust h2 { font-family: "Cormorant", serif; font-weight: 400; font-size: clamp(28px, 4.4vw, 46px); letter-spacing: -0.01em; max-width: 16ch; line-height: 1.12; }
  .trust h2 em { font-style: italic; color: #E6BFA0; }
  .trust p { color: rgba(241,234,220,0.7); max-width: 52ch; margin: 22px 0 0; font-size: 17px; }
  .trust a.inline { color: var(--paper); text-decoration: none; border-bottom: 1px solid rgba(241,234,220,0.4); padding-bottom: 1px; }
  .trust a.inline:hover { border-bottom-color: var(--paper); }

  /* ---- statement line ---- */
  .statement { text-align: center; }
  .statement h2 { font-size: clamp(34px, 5.5vw, 64px); letter-spacing: -0.02em; max-width: 16ch; margin: 0 auto; }

  /* ---- final cta (dark block) ---- */
  .cta-end { background: var(--ink); color: var(--paper); text-align: center; }
  .cta-end h2 { font-size: clamp(40px, 6vw, 72px); letter-spacing: -0.02em; }
  .cta-end h2 em { font-style: italic; font-weight: 400; color: #E6BFA0; }
  .cta-end p { color: rgba(241,234,220,0.72); margin: 18px auto 30px; max-width: 44ch; }
  .cta-end .btn-primary { background: var(--paper); color: var(--ink); }
  .cta-end .btn-primary:hover { box-shadow: 0 10px 26px -12px rgba(0,0,0,0.6); }

  /* ---- footer ---- */
  .footer { border-top: 1px solid var(--line); }
  .footer .wrap { padding: 44px 24px; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .footer .brand b { font-size: 17px; }
  .footer-links { display: flex; gap: 24px; flex-wrap: wrap; }
  .footer-links a { color: var(--muted); text-decoration: none; font-size: 14.5px; }
  .footer-links a:hover { color: var(--ink); }
  .footer .copy { color: var(--faint); font-size: 13px; width: 100%; }

  /* focus */
  a:focus-visible, .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 6px; }

  /* ---- responsive ---- */
  @media (max-width: 760px) {
    .step { grid-template-columns: 1fr; gap: 28px; }
    .step:nth-child(even) .step-text { order: 0; }
    .phone { width: 220px; }
    .features { grid-template-columns: 1fr; }
    .nav-link.hide-sm { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .cell { animation: none !important; opacity: 1; transform: none; }
    .btn:hover { transform: none; }
  }

  /* ====================== LIVE PHONE MOCKUPS ====================== */
  /* Rendered in-page (not screenshots), sized with container-query units so
     everything scales crisply inside the phone frame at any width. */
  .phone .screen.mock { display: block; background: var(--paper); container-type: size; }
  .mk { position: absolute; inset: 0; overflow: hidden; background: var(--paper); padding: 7cqw 5.5cqw 0; }
  .mk svg { display: block; }
  /* iOS status bar (breaks out of the .mk padding to sit flush at the top) */
  .mk-status { position: relative; margin: -7cqw -5.5cqw 4cqw; height: 13.8cqw; padding: 4.6cqw 6.7cqw 0; display: flex; align-items: center; justify-content: space-between; }
  .mk-status .t { font-family: "Hanken Grotesk", sans-serif; font-size: 4.1cqw; font-weight: 600; color: #1C1813; }
  .mk-status .island { position: absolute; left: 50%; top: 2.3cqw; transform: translateX(-50%); width: 21.5cqw; height: 6.7cqw; border-radius: 999px; background: #0b0907; }
  .mk-status .sb { display: flex; align-items: center; gap: 1.8cqw; }
  .mk-status .sb svg { display: block; height: 3cqw; width: auto; }

  /* week strip */
  .mk-week { display: flex; align-items: flex-end; gap: 1.5cqw; margin-bottom: 4cqw; }
  .mk-week .d { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1.6cqw; }
  .mk-week .wd { font-family: "Hanken Grotesk", sans-serif; font-size: 3cqw; color: var(--faint); }
  .mk-week .nm { width: 8.4cqw; height: 8.4cqw; border-radius: 50%; display: grid; place-items: center;
                 font-family: "Hanken Grotesk", sans-serif; font-size: 3.4cqw; color: var(--muted); background: var(--paper-2); }
  .mk-week .d.has .nm { color: var(--ink); }
  .mk-week .d.on .wd { color: var(--ink); font-weight: 700; }
  .mk-week .d.on .nm { background: var(--joy); color: #fff; font-weight: 600; }

  /* greeting */
  .mk-greet { font-family: "Cormorant", serif; font-weight: 600; font-size: 8.6cqw; line-height: 1.04;
              color: var(--ink); margin: 1.5cqw 0 4.5cqw; }
  .mk-greet em { font-style: italic; color: var(--love); }
  .mk-eyebrow { text-align: center; font-family: "Hanken Grotesk", sans-serif; font-weight: 600;
                font-size: 2.7cqw; letter-spacing: 0.2em; text-transform: uppercase; color: var(--faint); margin-bottom: 3.5cqw; }

  /* entry cards */
  .mk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3.4cqw; }
  .mk-card { background: color-mix(in srgb, var(--mc, var(--calm)) 20%, var(--paper-2)); border-radius: 5cqw;
             padding: 4cqw; aspect-ratio: 1 / 1; display: flex; flex-direction: column; }
  .mk-card .t { font-family: "Cormorant", serif; font-weight: 600; font-size: 4.7cqw; line-height: 1.06; color: var(--ink); }
  .mk-card .p { font-family: "Newsreader", serif; font-size: 3.4cqw; line-height: 1.3; color: var(--muted);
                margin-top: 2cqw; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
  .mk-card .m { margin-top: auto; display: flex; align-items: center; justify-content: space-between; gap: 1.5cqw; padding-top: 3cqw; }
  .mk-card .time { font-family: "Hanken Grotesk", sans-serif; font-size: 2.8cqw; color: var(--faint); }
  .mk-card .pill { font-family: "Hanken Grotesk", sans-serif; font-size: 2.8cqw; font-weight: 600; color: var(--mc);
                   background: var(--paper); border-radius: 999px; padding: 1.4cqw 3cqw; }

  /* floating tab bar */
  /* tab bar matching the Home.dc.html design: centered glass pill (active tab) + detached mic */
  .mk-tab { position: absolute; left: 0; right: 0; bottom: 0; z-index: 6; height: 30.3cqw; pointer-events: none; padding: 10.3cqw 5.1cqw 0; background: linear-gradient(to top, var(--paper) 40%, transparent); }
  .mk-tab .pill { position: absolute; left: 50%; top: 10.3cqw; transform: translateX(-50%); width: 54.6cqw; height: 12.8cqw; display: flex; align-items: center; justify-content: center; gap: 1cqw; padding: 1.8cqw; border-radius: 999px; background: rgba(251,248,241,0.7); backdrop-filter: blur(8px); border: 0.26cqw solid rgba(255,255,255,0.55); box-shadow: 0 2.6cqw 7cqw -3.6cqw rgba(43,32,20,0.2); }
  .mk-tab .pill button { width: 11.3cqw; height: 9.2cqw; border: 0; background: transparent; border-radius: 999px; display: grid; place-items: center; }
  .mk-tab .pill button.on { width: 13.8cqw; background: rgba(28,24,19,0.10); }
  .mk-tab .pill svg { width: 5.6cqw; height: 5.6cqw; color: #1C1813; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .mk-tab .pill button.on svg { fill: #1C1813; stroke: none; }
  .mk-mic { position: absolute; right: 5.1cqw; bottom: 7.2cqw; z-index: 7; width: 12.8cqw; height: 12.8cqw; border-radius: 999px; background: #1C1813; display: grid; place-items: center; box-shadow: 0 2.6cqw 7cqw -3.6cqw rgba(43,32,20,0.55); }
  .mk-mic svg { width: 5.6cqw; height: 5.6cqw; color: #FBF8F1; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* reflections screen */
  .mk-rtitle { font-family: "Cormorant", serif; font-weight: 600; font-size: 8.4cqw; color: var(--ink); line-height: 1; }
  .mk-rsub { font-family: "Newsreader", serif; font-size: 3.4cqw; color: var(--muted); margin: 1cqw 0 5cqw; }
  .mk-buckets { display: flex; gap: 3cqw; margin-bottom: 4cqw; }   /* horizontal scroller: a couple peek past the edge */
  .mk-bucket { flex: 0 0 38cqw; background: color-mix(in srgb, var(--mc) 18%, var(--paper-2)); border-radius: 5cqw; padding: 4cqw; }
  .mk-bucket .h { display: flex; align-items: center; gap: 2cqw; font-family: "Cormorant", serif; font-weight: 600; font-size: 4.7cqw; color: var(--ink); margin-bottom: 2.6cqw; }
  .mk-bucket .h i { width: 2.6cqw; height: 2.6cqw; border-radius: 50%; background: var(--mc); }
  .mk-bucket .row { font-family: "Newsreader", serif; font-size: 3.4cqw; color: var(--muted); line-height: 1.85; }
  .mk-subject { background: var(--paper-2); border-radius: 5cqw; padding: 4.5cqw; }
  .mk-subject .sh { display: flex; align-items: center; justify-content: space-between; gap: 2cqw; }
  .mk-subject .sh b { font-family: "Cormorant", serif; font-weight: 600; font-size: 6cqw; color: var(--ink); }
  .mk-subject + .mk-subject { margin-top: 3cqw; }
  .mk-subject .sh .pill { font-family: "Hanken Grotesk", sans-serif; font-size: 2.8cqw; font-weight: 600; color: var(--p, var(--joy));
                          background: var(--paper); border-radius: 999px; padding: 1.6cqw 3cqw; display: inline-flex; align-items: center; gap: 1.6cqw; }
  .mk-subject .sh .pill i { width: 2.2cqw; height: 2.2cqw; border-radius: 50%; background: var(--p, var(--joy)); }
  .mk-subject .q { font-family: "Newsreader", serif; font-size: 3.7cqw; line-height: 1.5; color: var(--ink); margin-top: 3cqw; }

  /* ---- record screen ---- */
  .mk-rec { display: flex; flex-direction: column; height: 100%; padding-top: 5cqw; }
  .mk-rec .top { display: flex; align-items: center; justify-content: space-between; }
  .mk-rec .x { width: 8.4cqw; height: 8.4cqw; border-radius: 50%; background: var(--paper); box-shadow: inset 0 0 0 1px var(--line); display: grid; place-items: center; }
  .mk-rec .x svg { width: 3.6cqw; height: 3.6cqw; fill: none; stroke: var(--muted); stroke-width: 2.2; stroke-linecap: round; }
  .mk-rec .date { font-family: "Hanken Grotesk", sans-serif; font-size: 2.7cqw; letter-spacing: 0.16em; text-transform: uppercase; color: var(--faint); }
  .mk-rec .hero { font-family: "Cormorant", serif; font-style: italic; font-size: 6.6cqw; line-height: 1.26; text-align: center; color: var(--ink); padding: 0 3cqw; margin: 11cqw 0 7cqw; }
  .mk-rec .pills { display: flex; gap: 2.2cqw; justify-content: center; margin-bottom: 7cqw; }
  .mk-rec .fp { display: inline-flex; align-items: center; gap: 1.7cqw; font-family: "Hanken Grotesk", sans-serif; font-size: 2.6cqw; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink); background: var(--paper); border: 1px solid var(--line); border-radius: 999px; padding: 1.8cqw 3cqw; }
  .mk-rec .fp i { width: 2cqw; height: 2cqw; border-radius: 50%; }
  .mk-rec .wave { display: flex; align-items: center; justify-content: center; gap: 0.9cqw; height: 13cqw; margin-bottom: 6cqw; }

  /* ====================== NAV SCROLL-SPY ====================== */
  .nav-link { position: relative; }
  .nav-link::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -4px; height: 1.5px;
    background: var(--accent); border-radius: 2px;
    transform: scaleX(0); transform-origin: left; transition: transform .28s ease;
  }
  .nav-link.active { color: var(--ink); }
  .nav-link.active::after { transform: scaleX(1); }
  .nav-link.beta::after { display: none; }

  /* hero scroll cue */
  .scroll-cue {
    display: inline-flex; flex-direction: column; align-items: center; gap: 7px;
    margin-top: clamp(40px, 6vw, 70px);
    font-size: 11.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--faint);
  }
  .scroll-cue svg { width: 16px; height: 16px; stroke: var(--faint); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; animation: cueBob 2.2s ease-in-out infinite; }
  @keyframes cueBob { 0%,100% { transform: translateY(0); opacity: .6; } 50% { transform: translateY(4px); opacity: 1; } }

  /* ====================== SHOWCASE — pinned parallax phone ====================== */
  .showcase { position: relative; padding: clamp(48px, 7vw, 96px) 0 clamp(24px, 4vw, 48px); }
  .show-head { max-width: 660px; margin: 0 auto clamp(8px, 2vw, 24px); text-align: center; }
  .show-head .eyebrow { display: block; margin-bottom: 16px; }
  .show-head h2 { font-size: clamp(32px, 4.6vw, 52px); letter-spacing: -0.015em; }
  .show-head p { color: var(--muted); font-size: 18px; margin: 18px auto 0; max-width: 46ch; }

  .show-grid { display: grid; grid-template-columns: 1fr clamp(320px, 38vw, 452px); gap: clamp(24px, 5vw, 72px); align-items: start; }

  /* steps column (drives the scroll) */
  .show-copy { padding: 0; }
  .show-step { min-height: 88vh; display: flex; flex-direction: column; justify-content: center;
               opacity: 0.32; transition: opacity .45s ease; }
  .show-step.current { opacity: 1; }
  .show-step .num { display: inline-flex; align-items: center; gap: 10px;
                    font-family: "Cormorant", serif; font-style: italic; font-weight: 500;
                    font-size: 19px; color: var(--accent); }
  .show-step .num i { width: 22px; height: 1px; background: var(--accent); opacity: .5; }
  .show-step h3 { font-size: clamp(28px, 3.8vw, 44px); margin-top: 12px; letter-spacing: -0.015em; max-width: 16ch; }
  .show-step p { color: var(--muted); margin: 18px 0 0; max-width: 30rem; font-size: 18px; }

  /* sticky stage holding the hand + phone */
  .show-stage { position: sticky; top: 0; height: 100vh; display: grid; place-items: center; }
  .stage-phone { position: relative; will-change: transform;
                 transform: translateY(var(--ty, 0px));
                 transition: transform .25s ease-out; }

  /* the hand photo (PNG with a cut-out screen) + the live screen overlaid in it */
  .hand { position: relative; width: min(100%, 440px); margin: 0 auto;
          filter: drop-shadow(0 40px 60px rgba(20,15,10,0.42)); }
  .hand-img { display: block; width: 100%; height: auto; pointer-events: none;
              -webkit-user-select: none; user-select: none; position: relative; z-index: 2;
              aspect-ratio: 2840 / 3826; }
  /* screen quad — tune these four to line the app up inside the phone */
  .hand-screen {
    /* slight bleed past the cut-out; the hand PNG (z-index 2) masks it to the
       exact rounded screen shape, so there's never a seam */
    position: absolute; z-index: 1; overflow: hidden;
    left:   var(--sx1, 44.9%);
    right:  var(--sx2, 13.8%);
    top:    var(--sy1, 2.7%);
    bottom: var(--sy2, 30.4%);
    background: #0b0907;
  }
  .hand-screen .stage-screen { position: absolute; inset: 0; width: auto; height: auto;
                               display: block; container-type: size; overflow: hidden;
                               opacity: 0; transform: scale(0.985);
                               transition: opacity .6s ease, transform .6s ease; pointer-events: none; }
  .hand-screen .stage-screen.on { opacity: 1; transform: none; pointer-events: auto; }
  .hand-screen .stage-screen.dc   { background: #F4EFE4; }
  .hand-screen .stage-screen.mock { background: var(--paper); }
  /* progress rail */
  .show-rail { position: absolute; z-index: 3; top: 50%; left: -8px; transform: translateY(-50%);
               display: flex; flex-direction: column; gap: 10px; }
  .show-rail i { width: 6px; height: 6px; border-radius: 999px; background: var(--line); transition: background .3s, height .3s; }
  .show-rail i.on { background: var(--accent); height: 22px; }

  /* ====================== EIGHT MOODS BAND ====================== */
  .moods { text-align: center; }
  .moods .section-head { margin: 0 auto; }
  .palette { margin: clamp(40px, 6vw, 64px) auto 0; display: grid;
             grid-template-columns: repeat(8, 1fr); gap: clamp(10px, 1.6vw, 18px); max-width: 900px; }
  .mchip { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .mchip .sw { width: 100%; aspect-ratio: 1; border-radius: clamp(14px, 1.8vw, 22px);
               background: var(--c); box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05), 0 16px 30px -18px var(--c);
               opacity: 0; transform: translateY(12px) scale(0.9); transition: opacity .5s ease, transform .5s cubic-bezier(.2,.8,.2,1); }
  .moods.revealed .mchip .sw { opacity: 1; transform: none; }
  .mchip:nth-child(1) .sw { transition-delay: .00s; } .mchip:nth-child(2) .sw { transition-delay: .05s; }
  .mchip:nth-child(3) .sw { transition-delay: .10s; } .mchip:nth-child(4) .sw { transition-delay: .15s; }
  .mchip:nth-child(5) .sw { transition-delay: .20s; } .mchip:nth-child(6) .sw { transition-delay: .25s; }
  .mchip:nth-child(7) .sw { transition-delay: .30s; } .mchip:nth-child(8) .sw { transition-delay: .35s; }
  .mchip span { font-size: 13.5px; color: var(--muted); font-weight: 500; }

  /* ====================== FEATURE BAND (reflections) ====================== */
  .fband { display: grid; grid-template-columns: clamp(280px, 32vw, 372px) 1fr; gap: clamp(28px, 5vw, 80px); align-items: center; }
  .fband .fb-phone { justify-self: center; }
  .fband .fb-text { max-width: 30rem; }
  .fband .fb-text .eyebrow { display: block; margin-bottom: 14px; }
  .fband .fb-text h2 { font-size: clamp(30px, 4.2vw, 48px); letter-spacing: -0.015em; }
  .fband .fb-text p { color: var(--muted); font-size: 18px; margin: 18px 0 0; }

  /* gentle float for static phones */
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .float { animation: floaty 7s ease-in-out infinite; }

  @media (max-width: 880px) {
    .show-grid { grid-template-columns: 1fr; gap: 0; }
    .show-stage { order: -1; position: sticky; top: 56px; height: 58vh; margin-bottom: 8px; }
    .stage-phone { transform: none !important; }
    .hand { width: min(230px, 60vw); filter: drop-shadow(0 22px 34px rgba(20,15,10,0.4)); }

    .show-rail { display: none; }
    .palette { grid-template-columns: repeat(4, 1fr); max-width: 420px; }
    .fband { grid-template-columns: 1fr; gap: 36px; }
    .fband .fb-text { order: 0; text-align: left; }
  }

  @media (prefers-reduced-motion: reduce) {
    .float { animation: none; }
    .scroll-cue svg { animation: none; }
    .stage-phone { transform: none !important; }
    .stage-phone .screen { transition: opacity .2s ease; transform: none; }
    .moods .mchip .sw { opacity: 1; transform: none; }
  }
</style>
